global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: extube-app
    metrics_path: /metrics
    static_configs:
      - targets:
          - app:8000

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121
