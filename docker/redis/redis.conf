# EXTube Redis Configuration
# 이 파일은 프로덕션 환경에서 사용됩니다.
# 비밀번호는 docker-compose.prod.yml에서 환경변수로 주입합니다.

# --- 네트워크 ---
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# --- 메모리 ---
maxmemory 512mb
maxmemory-policy allkeys-lru

# --- RDB 스냅샷 (보조 백업) ---
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# --- AOF 영속성 (주 백업) ---
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes

# --- 로깅 ---
loglevel notice
