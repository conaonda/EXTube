services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
    environment:
      - PYTHONUNBUFFERED=1
      - EXTUBE_REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  rq-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: rq worker gpu --url redis://redis:6379
    volumes:
      - ..:/app
    environment:
      - PYTHONUNBUFFERED=1
      - EXTUBE_REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  app-gpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    ports:
      - "8001:8000"
    volumes:
      - ..:/app
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      - EXTUBE_REDIS_URL=redis://redis:6379
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - redis
    profiles:
      - gpu

  rq-worker-gpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    command: rq worker gpu --url redis://redis:6379
    volumes:
      - ..:/app
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      - EXTUBE_REDIS_URL=redis://redis:6379
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - redis
    profiles:
      - gpu

volumes:
  redis_data:
