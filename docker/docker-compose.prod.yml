services:
  redis:
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
      --appendfsync everysec
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  app:
    image: ${DOCKER_IMAGE:-extube/app}:${DOCKER_TAG:-latest}
    build: !reset null
    restart: unless-stopped
    ports: !reset []
    volumes:
      - app_storage:/app/storage
    environment:
      - PYTHONUNBUFFERED=1
      - EXTUBE_REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  rq-worker:
    image: ${DOCKER_IMAGE:-extube/app}:${DOCKER_TAG:-latest}
    build: !reset null
    restart: unless-stopped
    command: rq worker gpu --url redis://:${REDIS_PASSWORD}@redis:6379
    volumes:
      - app_storage:/app/storage
    environment:
      - PYTHONUNBUFFERED=1
      - EXTUBE_REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl_certs:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ssl_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  app_storage:
  ssl_certs:
  certbot_webroot:
