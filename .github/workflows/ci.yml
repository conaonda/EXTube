name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg colmap

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Lint (Python)
        run: |
          ruff check src/ tests/ --exclude src/viewer/
          ruff format --check src/ tests/ --exclude src/viewer/

      - name: Test
        run: make test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd src/viewer && npm ci

      - name: Lint (Frontend)
        run: cd src/viewer && npx eslint .

      - name: Build
        run: cd src/viewer && npm run build
