name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg colmap

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Lint (Python)
        run: |
          ruff check src/ tests/ --exclude src/viewer/
          ruff format --check src/ tests/ --exclude src/viewer/

      - name: Test with coverage
        run: make coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml

      - name: Coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.70

  docker-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest requests

      - name: Build and start test services
        run: docker compose -f docker/docker-compose.test.yml up -d --build
        env:
          COMPOSE_PROJECT_NAME: extube-ci-test

      - name: Wait for app health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8099/health > /dev/null 2>&1; then
              echo "App is healthy"
              exit 0
            fi
            echo "Waiting for app to be healthy... ($i/30)"
            sleep 2
          done
          echo "App failed to become healthy"
          docker compose -f docker/docker-compose.test.yml logs app
          exit 1
        env:
          COMPOSE_PROJECT_NAME: extube-ci-test

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short
        env:
          INTEGRATION_TEST_URL: http://localhost:8099

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down -v
        env:
          COMPOSE_PROJECT_NAME: extube-ci-test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd src/viewer && npm ci

      - name: Lint (Frontend)
        run: cd src/viewer && npx eslint .

      - name: Test (Frontend)
        run: cd src/viewer && npx vitest run

      - name: Build
        run: cd src/viewer && npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd src/viewer && npm ci

      - name: Install Playwright browsers
        run: cd src/viewer && npx playwright install --with-deps chromium

      - name: Build
        run: cd src/viewer && npm run build

      - name: Run E2E tests
        run: cd src/viewer && npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/viewer/playwright-report/
          retention-days: 7
