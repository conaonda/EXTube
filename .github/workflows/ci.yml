name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg colmap

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Lint (Python)
        run: |
          ruff check src/ tests/ --exclude src/viewer/
          ruff format --check src/ tests/ --exclude src/viewer/

      - name: Test
        run: make test

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile: [docker/Dockerfile]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f ${{ matrix.dockerfile }} -t extube-ci:${{ github.sha }} .

  integration-test:
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose -f docker/docker-compose.yml up -d redis app
        env:
          COMPOSE_PROJECT_NAME: extube-ci

      - name: Wait for app health check
        run: |
          for i in $(seq 1 30); do
            if docker compose -f docker/docker-compose.yml ps app --format json | grep -q '"healthy"'; then
              echo "App is healthy"
              exit 0
            fi
            echo "Waiting for app to be healthy... ($i/30)"
            sleep 5
          done
          echo "App failed to become healthy"
          docker compose -f docker/docker-compose.yml logs app
          exit 1
        env:
          COMPOSE_PROJECT_NAME: extube-ci

      - name: Test health endpoint
        run: |
          curl -sf http://localhost:8000/health | grep -q '"status"'

      - name: Test ready endpoint (Redis connection)
        run: |
          curl -sf http://localhost:8000/health/ready | grep -q '"status"'

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
        env:
          COMPOSE_PROJECT_NAME: extube-ci

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd src/viewer && npm ci

      - name: Lint (Frontend)
        run: cd src/viewer && npx eslint .

      - name: Build
        run: cd src/viewer && npm run build
