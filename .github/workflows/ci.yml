name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg colmap

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Lint (Python)
        run: |
          ruff check src/ tests/ --exclude src/viewer/
          ruff format --check src/ tests/ --exclude src/viewer/

      - name: Test with coverage
        run: make coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml

      - name: Coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.70

  docker-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose -f docker/docker-compose.yml up -d --build redis app
        env:
          COMPOSE_PROJECT_NAME: extube-ci

      - name: Wait for app health check
        run: |
          for i in $(seq 1 30); do
            if docker inspect --format='{{.State.Health.Status}}' \
              $(docker compose -f docker/docker-compose.yml ps -q app) | grep -q "healthy"; then
              echo "App is healthy"
              exit 0
            fi
            echo "Waiting for app to be healthy... ($i/30)"
            sleep 5
          done
          echo "App failed to become healthy"
          docker compose -f docker/docker-compose.yml logs app
          exit 1
        env:
          COMPOSE_PROJECT_NAME: extube-ci

      - name: Test health endpoint
        run: |
          curl -sf http://localhost:8000/health | grep -q '"status"'

      - name: Test ready endpoint (Redis connection)
        run: |
          curl -sf http://localhost:8000/health/ready | grep -q '"status"'

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
        env:
          COMPOSE_PROJECT_NAME: extube-ci

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd src/viewer && npm ci

      - name: Lint (Frontend)
        run: cd src/viewer && npx eslint .

      - name: Test (Frontend)
        run: cd src/viewer && npx vitest run

      - name: Build
        run: cd src/viewer && npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd src/viewer && npm ci

      - name: Install Playwright browsers
        run: cd src/viewer && npx playwright install --with-deps chromium

      - name: Build
        run: cd src/viewer && npm run build

      - name: Run E2E tests
        run: cd src/viewer && npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/viewer/playwright-report/
          retention-days: 7
