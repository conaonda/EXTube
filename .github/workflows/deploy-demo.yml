name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/viewer/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/viewer/package-lock.json

      - name: Install dependencies
        working-directory: src/viewer
        run: npm ci

      - name: Build
        working-directory: src/viewer
        env:
          VITE_BASE_PATH: /EXTube/
        run: npm run build

      - name: Copy index.html to 404.html for SPA routing
        run: cp src/viewer/dist/index.html src/viewer/dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/viewer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
